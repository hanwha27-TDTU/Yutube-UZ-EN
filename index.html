<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClipSpeak — 원어민 발음 검색기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #6ee7b7;
    --accent2: #f59e0b;
    --red: #f87171;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 배경 그라디언트 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 10% 0%, rgba(110,231,183,.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 90% 80%, rgba(245,158,11,.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 20px; }

  /* ── HEADER ── */
  header {
    padding: 28px 0 20px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 42px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }
  .logo span { color: var(--accent2); }
  .tagline {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* ── SEARCH BAR ── */
  .search-row {
    display: grid;
    grid-template-columns: 1fr 120px 120px auto;
    gap: 10px;
    margin-bottom: 28px;
  }
  .search-row input,
  .search-row select {
    height: 52px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 0 16px;
    font-family: var(--font-body);
    font-size: 16px;
    outline: none;
    transition: border-color .2s;
  }
  .search-row input:focus,
  .search-row select:focus { border-color: var(--accent); }
  .search-row input::placeholder { color: var(--muted); }

  .btn-search {
    height: 52px;
    padding: 0 28px;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 10px;
    font-family: var(--font-display);
    font-size: 20px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    white-space: nowrap;
  }
  .btn-search:hover { opacity: .88; }
  .btn-search:active { transform: scale(.97); }

  /* ── MAIN LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: minmax(0,1.4fr) minmax(0,.8fr);
    gap: 20px;
    align-items: start;
  }

  /* ── PLAYER ── */
  .player-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .player-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
  }
  #yt-player { width: 100%; height: 100%; display: block; }

  .player-footer {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid var(--border);
  }
  .btn-ctrl {
    height: 40px;
    min-width: 40px;
    padding: 0 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: var(--font-body);
  }
  .btn-ctrl:hover { background: var(--border); }
  .btn-ctrl.active { background: #0d2e24; border-color: var(--accent); color: var(--accent); }

  .clip-counter {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--muted);
  }
  .clip-counter strong { color: var(--text); }

  /* 현재 자막 표시 */
  .caption-display {
    margin-top: 14px;
    min-height: 72px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    font-size: 18px;
    line-height: 1.6;
    display: flex;
    align-items: center;
  }
  .caption-display mark {
    background: transparent;
    color: var(--accent);
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .caption-display .placeholder {
    color: var(--muted);
    font-size: 15px;
  }

  /* loop 배너 */
  .loop-banner {
    margin-top: 10px;
    display: none;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    background: #0d2e24;
    border: 1px solid var(--accent);
    border-radius: 8px;
    font-size: 13px;
    color: var(--accent);
  }
  .loop-banner.show { display: flex; }
  .loop-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── RESULTS PANEL ── */
  .results-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    max-height: calc(100vh - 180px);
    display: flex;
    flex-direction: column;
  }
  .results-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .results-title {
    font-family: var(--font-display);
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--text);
  }
  .results-count {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    background: var(--surface2);
    padding: 3px 10px;
    border-radius: 99px;
  }

  .results-list {
    overflow-y: auto;
    flex: 1;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .result-item {
    width: 100%;
    text-align: left;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 11px 13px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    display: grid;
    grid-template-columns: 44px 1fr 22px;
    gap: 8px;
    align-items: center;
    font-family: var(--font-body);
    color: var(--text);
  }
  .result-item:hover { border-color: #3a3a55; background: #1e1e2e; }
  .result-item.active {
    border-color: var(--accent);
    background: #0d2e24;
  }
  .result-ts {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }
  .result-text { font-size: 13.5px; line-height: 1.5; word-break: break-word; }
  .result-text mark {
    background: rgba(110,231,183,.18);
    color: var(--accent);
    border-radius: 3px;
    padding: 0 2px;
  }
  .result-icon { font-size: 12px; color: var(--muted); text-align: right; }
  .result-item.active .result-icon { color: var(--accent); }

  /* 상태 메시지 */
  .state-msg {
    padding: 30px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.8;
  }
  .state-msg .big { font-size: 32px; display: block; margin-bottom: 8px; }

  /* 에러 */
  .error-bar {
    display: none;
    margin-bottom: 12px;
    padding: 12px 16px;
    background: #1f0a0a;
    border: 1px solid var(--red);
    border-radius: 10px;
    color: var(--red);
    font-size: 13px;
    line-height: 1.6;
  }
  .error-bar.show { display: block; }

  /* 힌트 */
  .hint-bar {
    margin-top: 10px;
    padding: 10px 14px;
    background: #131320;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
  }
  .hint-bar code { color: var(--accent2); font-family: var(--font-mono); }

  /* 로딩 스피너 */
  .spinner {
    display: none;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner.show { display: inline-block; }

  /* 반응형 */
  @media (max-width: 760px) {
    .layout { grid-template-columns: 1fr; }
    .search-row { grid-template-columns: 1fr 1fr; }
    .search-row input { grid-column: 1/-1; }
    .btn-search { grid-column: 1/-1; }
    .results-card { max-height: 50vh; }
    header { padding: 18px 0 14px; }
    .logo { font-size: 32px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">Clip<span>Speak</span></div>
    <div class="tagline">원어민 발음을 자막으로 검색하고 들어보세요</div>
  </header>

  <!-- 검색 -->
  <div class="search-row">
    <input id="q" type="text" placeholder="검색할 단어 또는 문장 입력…" value="comfortable" autocomplete="off">
    <select id="lang">
      <option value="en">🇺🇸 English</option>
      <option value="ko">🇰🇷 한국어</option>
      <option value="es">🇪🇸 Español</option>
      <option value="ja">🇯🇵 日本語</option>
      <option value="fr">🇫🇷 Français</option>
    </select>
    <select id="accent">
      <option value="us">US 억양</option>
      <option value="uk">UK 억양</option>
      <option value="any">모든 억양</option>
    </select>
    <button class="btn-search" onclick="doSearch()">SEARCH</button>
  </div>

  <div id="errorBar" class="error-bar"></div>

  <div class="layout">
    <!-- 왼쪽: 플레이어 -->
    <div>
      <div class="player-card">
        <div class="player-wrap">
          <div id="yt-player"></div>
        </div>
        <div class="player-footer">
          <button class="btn-ctrl" onclick="prevClip()" title="이전">◀ 이전</button>
          <button class="btn-ctrl" onclick="replayClip()" title="다시 듣기">↺</button>
          <button class="btn-ctrl" id="btnLoop" onclick="toggleLoop()" title="구간 반복">🔁 반복</button>
          <button class="btn-ctrl" onclick="nextClip()" title="다음">다음 ▶</button>
          <div class="clip-counter">
            <strong id="curIdx">–</strong> / <span id="totIdx">–</span>
          </div>
          <div class="spinner" id="spinner"></div>
        </div>
      </div>

      <!-- 현재 자막 -->
      <div class="caption-display" id="captionDisplay">
        <span class="placeholder">검색어를 입력하고 SEARCH를 눌러 시작하세요.</span>
      </div>

      <!-- 루프 배너 -->
      <div class="loop-banner" id="loopBanner">
        <div class="loop-dot"></div>
        구간 반복 재생 중 — 버튼을 다시 누르면 정지
      </div>

      <!-- 힌트 -->
      <div class="hint-bar">
        ✅ <strong>YouTube Search API 연동됨</strong> — 실시간으로 자막 있는 영상을 검색합니다.<br>
        ⚠️ 자막은 CORS 프록시 경유로 가져옵니다. 일부 영상은 차단될 수 있습니다.<br>
        💡 일일 쿼터: 검색 1회 = 100 유닛 / 무료 한도 10,000 유닛 (약 100회/일)
      </div>
    </div>

    <!-- 오른쪽: 결과 목록 -->
    <div class="results-card">
      <div class="results-header">
        <span class="results-title">RESULTS</span>
        <span class="results-count" id="resultCount">–</span>
      </div>
      <div class="results-list" id="resultsList">
        <div class="state-msg">
          <span class="big">🎙</span>
          단어를 검색하면<br>자막이 포함된 구간이 나타납니다.
        </div>
      </div>
    </div>
  </div>
</div>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ──────────────────────────────────────────────
//  CONFIG
// ──────────────────────────────────────────────
const BACKEND_URL  = null; // "https://PROJECT.supabase.co/functions/v1/get-transcript"
const YT_API_KEY   = "AIzaSyCK7SlC5X2mEO8tQr0rI6lLOOFo_1-Svwo";
const SEARCH_COUNT = 10; // 한 번에 검색할 영상 수 (최대 50, 쿼터 주의)

// ──────────────────────────────────────────────
//  STATE
// ──────────────────────────────────────────────
let player = null;
let ytReady = false;
let clips   = [];   // [{ videoId, start, dur, text }]
let cur     = 0;
let loopOn  = false;
let loopTimer = null;

// ──────────────────────────────────────────────
//  YouTube IFrame API
// ──────────────────────────────────────────────
function onYouTubeIframeAPIReady() {
  ytReady = true;
  player = new YT.Player("yt-player", {
    height: "100%", width: "100%",
    playerVars: { rel: 0, playsinline: 1, cc_load_policy: 0 },
    events: { onReady: () => {} }
  });
}

// ──────────────────────────────────────────────
//  유틸
// ──────────────────────────────────────────────
function fmt(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2,"0")}`;
}

function parseTimedText(xml) {
  const doc = new DOMParser().parseFromString(xml, "text/xml");
  return Array.from(doc.querySelectorAll("text")).map(el => ({
    start: parseFloat(el.getAttribute("start") || "0"),
    dur:   parseFloat(el.getAttribute("dur")   || "2"),
    text:  el.textContent
      .replace(/&#39;/g,"'").replace(/&amp;/g,"&")
      .replace(/&quot;/g,'"').replace(/\n/g," ").trim()
  }));
}

function highlight(text, q) {
  if (!q) return escHtml(text);
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`, "gi");
  return escHtml(text).replace(re, "<mark>$1</mark>");
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function showError(msg) {
  const el = document.getElementById("errorBar");
  el.textContent = msg;
  el.classList.add("show");
}

function clearError() {
  document.getElementById("errorBar").classList.remove("show");
}

function setSpinner(on) {
  document.getElementById("spinner").classList.toggle("show", on);
}

// ──────────────────────────────────────────────
//  자막 fetch — 다중 프록시 + 자동자막 fallback
// ──────────────────────────────────────────────

// 시도할 프록시 목록 (순서대로 fallback)
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://cors-anywhere.herokuapp.com/${url}`,
];

// 자막 URL 후보 생성 (수동자막 → 자동자막 순서)
function buildTimedUrls(videoId, lang) {
  return [
    // 수동 자막 (srv3 포맷)
    `https://www.youtube.com/api/timedtext?v=${videoId}&lang=${lang}&fmt=srv3`,
    // 자동 생성 자막 (asr)
    `https://www.youtube.com/api/timedtext?v=${videoId}&lang=${lang}&kind=asr&fmt=srv3`,
    // 영어 자동자막 fallback
    `https://www.youtube.com/api/timedtext?v=${videoId}&lang=en&kind=asr&fmt=srv3`,
    // 구버전 포맷
    `https://www.youtube.com/api/timedtext?v=${videoId}&lang=${lang}`,
  ];
}

async function fetchWithProxy(targetUrl) {
  for (const makeProxy of PROXIES) {
    try {
      const r = await fetch(makeProxy(targetUrl), { signal: AbortSignal.timeout(6000) });
      if (!r.ok) continue;
      const text = await r.text();
      if (text && text.length > 10) return text;
    } catch (_) { continue; }
  }
  return null;
}

async function fetchTranscript(videoId, lang) {
  // ① 백엔드 있으면 백엔드 우선
  if (BACKEND_URL) {
    const r = await fetch(BACKEND_URL, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ videoId, lang })
    });
    if (!r.ok) throw new Error(`Backend error ${r.status}`);
    return r.json();
  }

  // ② 다중 URL × 다중 프록시로 시도
  const urls = buildTimedUrls(videoId, lang);
  for (const timedUrl of urls) {
    const xml = await fetchWithProxy(timedUrl);
    if (xml && xml.includes("<text")) {
      return parseTimedText(xml);
    }
  }
  return null; // 자막 없는 영상
}

// ──────────────────────────────────────────────
//  YouTube Search API — 영상 ID 목록 가져오기
// ──────────────────────────────────────────────
async function searchVideoIds(q, lang) {
  // relevanceLanguage: 검색 결과 언어 힌트
  const params = new URLSearchParams({
    part:              "id",
    q:                 q,
    type:              "video",
    videoCaption:      "closedCaption", // 자막 있는 영상만
    relevanceLanguage: lang,
    maxResults:        SEARCH_COUNT,
    key:               YT_API_KEY
  });
  const url = `https://www.googleapis.com/youtube/v3/search?${params}`;
  const r = await fetch(url);
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err?.error?.message || `YouTube API 오류 (${r.status})`);
  }
  const data = await r.json();
  return (data.items || []).map(item => item.id.videoId).filter(Boolean);
}

// ──────────────────────────────────────────────
//  검색 실행
// ──────────────────────────────────────────────
async function doSearch() {
  clearError();
  const q    = document.getElementById("q").value.trim();
  const lang = document.getElementById("lang").value;
  if (!q) { showError("검색어를 입력하세요."); return; }

  clips = [];
  cur   = 0;
  document.getElementById("resultsList").innerHTML =
    `<div class="state-msg"><span class="big">⏳</span>YouTube에서 영상 검색 중…</div>`;
  document.getElementById("resultCount").textContent = "–";
  setSpinner(true);

  let videoIds = [];
  try {
    videoIds = await searchVideoIds(q, lang);
  } catch (e) {
    setSpinner(false);
    showError(`YouTube 검색 실패: ${e.message}`);
    document.getElementById("resultsList").innerHTML =
      `<div class="state-msg"><span class="big">⚠️</span>${e.message}</div>`;
    return;
  }

  if (!videoIds.length) {
    setSpinner(false);
    showError(`"${q}" 관련 영상을 찾지 못했습니다.`);
    document.getElementById("resultsList").innerHTML =
      `<div class="state-msg"><span class="big">😶</span>결과 없음</div>`;
    document.getElementById("resultCount").textContent = "0";
    return;
  }

  // 진행 상태 표시
  document.getElementById("resultsList").innerHTML =
    `<div class="state-msg"><span class="big">📄</span>영상 ${videoIds.length}개에서 자막 분석 중…</div>`;

  const found = [];
  for (const vid of videoIds) {
    try {
      const captions = await fetchTranscript(vid, lang);
      if (!captions) continue;
      const hits = captions.filter(c =>
        c.text.toLowerCase().includes(q.toLowerCase())
      );
      hits.forEach(h => found.push({ videoId: vid, ...h }));
    } catch (_) { /* 영상별 오류는 무시 */ }
  }

  setSpinner(false);
  clips = found;

  if (!found.length) {
    showError(`영상은 찾았지만 "${q}" 가 포함된 자막 문장이 없습니다. 다른 단어를 시도해보세요.`);
    document.getElementById("resultsList").innerHTML =
      `<div class="state-msg"><span class="big">😶</span>자막 매칭 없음</div>`;
    document.getElementById("resultCount").textContent = "0";
    return;
  }

  renderResults(q);
  playAt(0);
}

// ──────────────────────────────────────────────
//  결과 렌더
// ──────────────────────────────────────────────
function renderResults(q) {
  const list = document.getElementById("resultsList");
  document.getElementById("resultCount").textContent = `${clips.length}개`;
  list.innerHTML = "";
  clips.forEach((c, i) => {
    const btn = document.createElement("button");
    btn.className = "result-item" + (i === cur ? " active" : "");
    btn.innerHTML = `
      <span class="result-ts">${fmt(c.start)}</span>
      <span class="result-text">${highlight(c.text, q)}</span>
      <span class="result-icon">${i === cur ? "▶" : "›"}</span>`;
    btn.onclick = () => playAt(i);
    list.appendChild(btn);
  });
}

function updateResultHighlight() {
  document.querySelectorAll(".result-item").forEach((el, i) => {
    el.classList.toggle("active", i === cur);
    el.querySelector(".result-icon").textContent = i === cur ? "▶" : "›";
  });
  // 스크롤
  const active = document.querySelector(".result-item.active");
  active?.scrollIntoView({ block: "nearest", behavior: "smooth" });
}

// ──────────────────────────────────────────────
//  플레이어 제어
// ──────────────────────────────────────────────
function playAt(idx) {
  if (!clips.length) return;
  stopLoop();
  cur = idx;
  const c = clips[cur];
  const q = document.getElementById("q").value.trim();

  // 카운터
  document.getElementById("curIdx").textContent = cur + 1;
  document.getElementById("totIdx").textContent = clips.length;

  // 자막 표시
  document.getElementById("captionDisplay").innerHTML =
    highlight(c.text, q);

  // 플레이어
  if (player && player.loadVideoById) {
    player.loadVideoById({ videoId: c.videoId, startSeconds: c.start });
  }

  updateResultHighlight();
  if (loopOn) startLoopInterval();
}

function prevClip() { if (cur > 0) playAt(cur - 1); }
function nextClip() { if (cur < clips.length - 1) playAt(cur + 1); }

function replayClip() {
  if (!clips.length || !player) return;
  player.seekTo(clips[cur].start, true);
  player.playVideo();
}

// ── 반복 ──────────────────────────────────────
function toggleLoop() {
  loopOn = !loopOn;
  const btn = document.getElementById("btnLoop");
  btn.classList.toggle("active", loopOn);
  document.getElementById("loopBanner").classList.toggle("show", loopOn);
  if (loopOn) startLoopInterval();
  else stopLoop();
}

function startLoopInterval() {
  clearInterval(loopTimer);
  if (!clips.length || !player) return;
  const c   = clips[cur];
  const end = c.start + c.dur + 0.4;
  loopTimer = setInterval(() => {
    try {
      const t = player.getCurrentTime?.();
      if (t >= end) { player.seekTo(c.start, true); player.playVideo(); }
    } catch(_){}
  }, 200);
}

function stopLoop() {
  clearInterval(loopTimer);
}

// ── 엔터키 검색 ───────────────────────────────
document.getElementById("q").addEventListener("keydown", e => {
  if (e.key === "Enter") doSearch();
});
</script>
